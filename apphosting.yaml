# Firebase App Hosting → Cloud Run configuration
# Reference: https://firebase.google.com/docs/app-hosting/configure
#
# Deploys via:
#   firebase deploy --only apphosting
#
# All sensitive values (DATABASE_URL, GEMINI_API_KEY, DODO_PAYMENTS_API_KEY,
# DODO_WEBHOOK_SECRET, INTERNAL_CRON_SECRET, etc.) MUST be stored in Secret
# Manager and referenced via `secret:` — never inline as `value:`.
#
# Why most secrets have BUILD + RUNTIME availability:
# Next.js's "Collecting page data" step at build time loads server modules
# eagerly to determine which routes are static vs dynamic. Our env.ts
# performs Zod validation at module-load time, so any required env var
# must be present during build, not just at runtime.

runConfig:
  # ---- Autoscaling ----
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024
  cpuAlwaysAllocated: false
  timeoutSeconds: 60

env:
  # ---- Public (browser-readable) ----
  - variable: NEXT_PUBLIC_APP_URL
    secret: APP_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_URL
    secret: NEXT_PUBLIC_SUPABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUPABASE_ANON_KEY
    secret: NEXT_PUBLIC_SUPABASE_ANON_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_GOOGLE_CLIENT_ID
    secret: NEXT_PUBLIC_GOOGLE_CLIENT_ID
    availability:
      - BUILD
      - RUNTIME

  # ---- Server-only ----
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: APP_URL
    secret: APP_URL
    availability:
      - BUILD
      - RUNTIME

  # Postgres
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - BUILD
      - RUNTIME

  # Supabase server-side
  - variable: SUPABASE_URL
    secret: SUPABASE_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: SUPABASE_ANON_KEY
    secret: SUPABASE_ANON_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: SUPABASE_SERVICE_ROLE_KEY
    secret: SUPABASE_SERVICE_ROLE_KEY
    availability:
      - BUILD
      - RUNTIME

  # Gemini
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: GEMINI_MODEL
    value: gemini-2.5-flash
    availability:
      - BUILD
      - RUNTIME

  # Dodo Payments — uncomment and create the secrets in Secret Manager
  # AFTER your first live products + webhook are set up in the Dodo
  # dashboard. Until then these are intentionally absent so the
  # billing page falls into its `setup-pending` state.
  # - variable: DODO_PAYMENTS_API_KEY
  #   secret: DODO_PAYMENTS_API_KEY
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: DODO_WEBHOOK_SECRET
  #   secret: DODO_WEBHOOK_SECRET
  #   availability:
  #     - BUILD
  #     - RUNTIME
  - variable: DODO_ENVIRONMENT
    value: test_mode
    availability:
      - BUILD
      - RUNTIME

  # Upstash (rate limiting)
  - variable: UPSTASH_REDIS_REST_URL
    secret: UPSTASH_REDIS_REST_URL
    availability:
      - BUILD
      - RUNTIME
  - variable: UPSTASH_REDIS_REST_TOKEN
    secret: UPSTASH_REDIS_REST_TOKEN
    availability:
      - BUILD
      - RUNTIME

  # Cloud Scheduler shared secret for /api/internal/cleanup
  - variable: INTERNAL_CRON_SECRET
    secret: INTERNAL_CRON_SECRET
    availability:
      - BUILD
      - RUNTIME

  # Sentry (Phase 6) — uncomment after creating a Sentry project
  # - variable: SENTRY_DSN
  #   secret: SENTRY_DSN
  #   availability:
  #     - BUILD
  #     - RUNTIME
